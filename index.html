<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今晚吃什么 - 答案之书</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c1810 0%, #4a2c1a 50%, #6b3e26 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .restaurant-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .wood-texture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(139, 90, 43, 0.03) 50px,
                    rgba(139, 90, 43, 0.03) 51px
                );
        }

        .warm-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 180, 100, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .hanging-light {
            position: absolute;
            top: -20px;
            width: 80px;
            height: 120px;
        }

        .hanging-light::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, #8b7355, #5a4a3a);
            transform: translateX(-50%);
        }

        .light-bulb {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #fff8dc, #daa520, #b8860b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                0 10px 40px rgba(255, 180, 80, 0.6),
                0 0 80px rgba(255, 180, 80, 0.3),
                inset -5px -5px 10px rgba(0, 0, 0, 0.2);
            animation: flicker 3s ease-in-out infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }

        .hanging-light:nth-child(1) { left: 15%; }
        .hanging-light:nth-child(2) { left: 50%; transform: translateX(-50%); }
        .hanging-light:nth-child(3) { right: 15%; left: auto; }

        .aroma {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, rgba(255, 200, 150, 0.4), transparent);
            border-radius: 50%;
            animation: float-up 6s ease-in-out infinite;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .title {
            color: #fff8dc;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(139, 69, 19, 0.5);
            letter-spacing: 8px;
            font-weight: bold;
        }

        .subtitle {
            color: rgba(255, 248, 220, 0.7);
            font-size: 1rem;
            margin-bottom: 50px;
            letter-spacing: 3px;
        }

        .book-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 40px;
        }

        .book {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #8b4513 0%, #654321 50%, #4a3728 100%);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                inset 0 -10px 30px rgba(0, 0, 0, 0.3),
                inset 0 10px 30px rgba(255, 200, 150, 0.1),
                0 0 0 8px rgba(139, 90, 43, 0.3),
                0 0 0 16px rgba(139, 90, 43, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .book:hover {
            transform: scale(1.02);
            box-shadow: 
                0 25px 70px rgba(0, 0, 0, 0.5),
                inset 0 -10px 30px rgba(0, 0, 0, 0.3),
                inset 0 10px 30px rgba(255, 200, 150, 0.15),
                0 0 0 8px rgba(210, 105, 30, 0.5),
                0 0 0 16px rgba(210, 105, 30, 0.2),
                0 0 40px rgba(255, 180, 100, 0.3);
        }

        .book.spinning {
            animation: spin 0.5s ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.95); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .book-inner {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f5deb3 0%, #deb887 50%, #d2b48c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #8b4513;
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .result {
            color: #5a3d2b;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.5);
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result.placeholder {
            opacity: 0.6;
            font-size: 1.2rem;
            color: #8b7355;
        }

        .glow-ring {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: linear-gradient(90deg, #ff8c00, #ffa500, #ff8c00) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .book.spinning + .glow-ring {
            opacity: 1;
            animation: pulse 0.5s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .btn {
            background: linear-gradient(90deg, #d2691e 0%, #ff8c00 50%, #ffa500 100%);
            color: #fff;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 30px rgba(210, 105, 30, 0.4),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            letter-spacing: 4px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 15px 40px rgba(210, 105, 30, 0.6),
                inset 0 2px 5px rgba(255, 255, 255, 0.3);
            background: linear-gradient(90deg, #e67e22 0%, #ff9f1a 50%, #ffb84d 100%);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .food-categories {
            margin-top: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 600px;
        }

        .category-tag {
            background: rgba(255, 248, 220, 0.15);
            color: rgba(255, 248, 220, 0.9);
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 0.9rem;
            border: 1px solid rgba(210, 105, 30, 0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .category-tag:hover {
            background: rgba(210, 105, 30, 0.3);
            border-color: rgba(210, 105, 30, 0.6);
            transform: translateY(-2px);
        }

        .emoji {
            font-size: 1.5rem;
            margin-right: 5px;
        }

        .tableware {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.2), transparent);
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 2.2rem;
                letter-spacing: 4px;
            }
            
            .book-container {
                width: 280px;
                height: 280px;
            }
            
            .book-inner {
                width: 220px;
                height: 220px;
            }
            
            .result {
                font-size: 1.6rem;
            }

            .hanging-light {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="restaurant-bg">
        <div class="wood-texture"></div>
        <div class="warm-light"></div>
        <div class="hanging-light"><div class="light-bulb"></div></div>
        <div class="hanging-light"><div class="light-bulb"></div></div>
        <div class="hanging-light"><div class="light-bulb"></div></div>
    </div>
    <div class="tableware"></div>
    
    <div class="container">
        <h1 class="title">今晚吃什么</h1>
        <p class="subtitle">让答案之书为你指引方向</p>
        
        <div class="book-container">
            <div class="book" id="book">
                <div class="book-inner">
                    <div class="result placeholder" id="result">点击按钮<br>开始探索</div>
                </div>
            </div>
            <div class="glow-ring"></div>
        </div>
        
        <button class="btn" id="generateBtn">开始选择</button>
        
        <div class="food-categories">
            <span class="category-tag"><span class="emoji">🍜</span>面食</span>
            <span class="category-tag"><span class="emoji">🍚</span>米饭</span>
            <span class="category-tag"><span class="emoji">🥟</span>小吃</span>
            <span class="category-tag"><span class="emoji">🍔</span>快餐</span>
            <span class="category-tag"><span class="emoji">🥗</span>轻食</span>
            <span class="category-tag"><span class="emoji">🍲</span>火锅</span>
            <span class="category-tag"><span class="emoji">🍢</span>烧烤</span>
            <span class="category-tag"><span class="emoji">🥘</span>家常菜</span>
        </div>
    </div>

    <script>
        const foods = [
            { name: '麻辣烫', emoji: '🍲', category: '火锅' },
            { name: '兰州拉面', emoji: '🍜', category: '面食' },
            { name: '黄焖鸡米饭', emoji: '🍚', category: '米饭' },
            { name: '重庆小面', emoji: '🍜', category: '面食' },
            { name: '肯德基', emoji: '🍗', category: '快餐' },
            { name: '麦当劳', emoji: '🍔', category: '快餐' },
            { name: '沙县小吃', emoji: '🥟', category: '小吃' },
            { name: '兰州牛肉面', emoji: '🍜', category: '面食' },
            { name: '盖浇饭', emoji: '🍛', category: '米饭' },
            { name: '烧烤', emoji: '🍢', category: '烧烤' },
            { name: '火锅', emoji: '🍲', category: '火锅' },
            { name: '日料寿司', emoji: '🍣', category: '轻食' },
            { name: '披萨', emoji: '🍕', category: '快餐' },
            { name: '炒饭', emoji: '🍚', category: '米饭' },
            { name: '馄饨', emoji: '🥟', category: '小吃' },
            { name: '饺子', emoji: '🥟', category: '小吃' },
            { name: '螺蛳粉', emoji: '🍜', category: '面食' },
            { name: '米线', emoji: '🍜', category: '面食' },
            { name: '煲仔饭', emoji: '🍚', category: '米饭' },
            { name: '烤肉拌饭', emoji: '🍖', category: '米饭' },
            { name: '沙拉', emoji: '🥗', category: '轻食' },
            { name: '三明治', emoji: '🥪', category: '轻食' },
            { name: '煎饼果子', emoji: '🌯', category: '小吃' },
            { name: '肉夹馍', emoji: '🥙', category: '小吃' },
            { name: '水煮鱼', emoji: '🐟', category: '家常菜' },
            { name: '麻婆豆腐', emoji: '🍲', category: '家常菜' },
            { name: '宫保鸡丁', emoji: '🍗', category: '家常菜' },
            { name: '酸菜鱼', emoji: '🐟', category: '家常菜' },
            { name: '炸鸡', emoji: '🍗', category: '快餐' },
            { name: '汉堡王', emoji: '🍔', category: '快餐' }
        ];

        function createAroma() {
            const bg = document.querySelector('.restaurant-bg');
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const aroma = document.createElement('div');
                    aroma.className = 'aroma';
                    aroma.style.left = Math.random() * 100 + '%';
                    aroma.style.animationDelay = Math.random() * 2 + 's';
                    aroma.style.animationDuration = (5 + Math.random() * 3) + 's';
                    bg.appendChild(aroma);
                    setTimeout(() => aroma.remove(), 8000);
                }, i * 400);
            }
            setInterval(() => {
                const aroma = document.createElement('div');
                aroma.className = 'aroma';
                aroma.style.left = Math.random() * 100 + '%';
                aroma.style.animationDuration = (5 + Math.random() * 3) + 's';
                bg.appendChild(aroma);
                setTimeout(() => aroma.remove(), 8000);
            }, 1000);
        }

        function getRandomFood() {
            return foods[Math.floor(Math.random() * foods.length)];
        }

        function generateResult() {
            const book = document.getElementById('book');
            const result = document.getElementById('result');
            const btn = document.getElementById('generateBtn');
            
            btn.disabled = true;
            btn.textContent = '选择中...';
            book.classList.add('spinning');
            result.classList.remove('show');
            
            let count = 0;
            const interval = setInterval(() => {
                const food = getRandomFood();
                result.innerHTML = `${food.emoji}<br>${food.name}`;
                result.classList.remove('placeholder');
                result.style.opacity = '0.5';
                count++;
                
                if (count >= 10) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const finalFood = getRandomFood();
                        result.innerHTML = `${finalFood.emoji}<br>${finalFood.name}`;
                        result.style.opacity = '1';
                        result.classList.add('show');
                        book.classList.remove('spinning');
                        btn.disabled = false;
                        btn.textContent = '再选一次';
                    }, 200);
                }
            }, 100);
        }

        createAroma();
        document.getElementById('generateBtn').addEventListener('click', generateResult);
        document.getElementById('book').addEventListener('click', generateResult);
    </script>
</body>
</html>
